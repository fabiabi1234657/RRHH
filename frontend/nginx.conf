server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api al backend (mismo stack Docker)
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Reenviar cookies HTTP-only sin modificaciones
        proxy_pass_header Set-Cookie;
    }

    # SPA: todas las rutas desconocidas van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca se cachea para que nuevos despliegues surtan efecto de inmediato
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Archivos estáticos con hash en el nombre: caché agresiva (Vite garantiza hashes únicos por build)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
