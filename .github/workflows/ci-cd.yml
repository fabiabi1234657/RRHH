name: RRHH CI/CD
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - fix/compliance-pliego
  workflow_dispatch:

env:
  NODE_VERSION: 24

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 5000
      MONGO_URI: mongodb://127.0.0.1:27017/rrhh_ci
      MONGO_URI_TEST: mongodb://127.0.0.1:27017/rrhh_test
      JWT_SECRET: ci_jwt_secret_for_rrhh_backend_tests_change_in_production
      FRONTEND_URL: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint backend
        run: npm run lint
      - name: Test backend
        run: npm test
      - name: Coverage audit
        continue-on-error: true
        run: npm run test:coverage

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint frontend
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: E2E tests
        run: npm run e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t rrhh-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t rrhh-frontend:ci ./frontend

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK is not configured; skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
