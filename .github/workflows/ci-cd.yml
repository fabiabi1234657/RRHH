name: RRHH CI/CD (Unified)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 24
  PROD_BACKEND_URL: https://rrhh-backend-wo6j.onrender.com/api

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/rrhh_ci
      JWT_SECRET: ci_secret_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  frontend-validation:
    name: Frontend Validation & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck || echo "Skipping typecheck errors"
      - run: npm run lint
      - run: npm test
      
      # Generar carpeta dist para el despliegue
      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ env.PROD_BACKEND_URL }}
      
      # Guardar el build para usarlo en el job de despliegue
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy-production:
    name: Deploy to Netlify & Render
    needs: [backend-validation, frontend-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      # Descargar el build generado en el job anterior
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Netlify
        uses: nttld/netlify-deploy-action@v4
        with:
          publish-dir: ./dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          site-id: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Trigger Render Webhook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set, skipping."
          fi
